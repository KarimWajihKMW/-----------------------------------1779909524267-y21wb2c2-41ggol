<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="نواة تعليمية لإدارة اشتراكات المؤسسات التعليمية والمدارس والفروع والأقسام مع التصحيح الأعمى ولوحات متابعة تشغيلية." />

<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="scroll-progress" aria-hidden="true"></div>

        <strong>نواة</strong>

    <nav class="main-nav" aria-label="التنقل الرئيسي">
      <a href="/schools" class="route-link">المدارس والفروع</a>
      <a href="/subscriptions" class="route-link">الاشتراكات</a>

      <h2>اشتراكات، مدارس، أقسام، فروع وتصحيح أعمى في منصة واحدة.</h2>

    <div class="footer-links">
      <a href="/dashboard/reports" class="route-link">تقارير العمق</a>

      <a href="/android" class="route-link">تطبيق أندرويد</a>
    </div>
  </footer>

  <div class="modal" id="crudModal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-panel">
      <button class="modal-close" type="button" aria-label="إغلاق">×</button>
      <h3 id="modalTitle">إضافة سجل</h3>
      <form id="crudForm" class="modal-form"></form>
    </div>
  </div>

  <script src="script.js"></script>
